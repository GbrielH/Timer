<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Beatriz 💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  /* ===== CANVAS GALÁXIA ===== */
  #galaxy {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ===== NEBULOSA ===== */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 1;
    animation: nebulaPulse 8s ease-in-out infinite alternate;
  }
  .nebula-1 { width: 500px; height: 400px; background: #6a0dad; top: -100px; left: -100px; animation-delay: 0s; }
  .nebula-2 { width: 400px; height: 350px; background: #c2185b; bottom: -80px; right: -80px; animation-delay: 3s; }
  .nebula-3 { width: 300px; height: 300px; background: #311b92; top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: 1.5s; }
  @keyframes nebulaPulse {
    from { transform: scale(1); opacity: 0.15; }
    to   { transform: scale(1.15); opacity: 0.25; }
  }
  .nebula-3 { animation-name: nebula3Pulse; }
  @keyframes nebula3Pulse {
    from { transform: translate(-50%,-50%) scale(1); opacity: 0.12; }
    to   { transform: translate(-50%,-50%) scale(1.2); opacity: 0.22; }
  }

  /* ===== CARD PRINCIPAL ===== */
  .card {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
    padding: 2.4rem 2rem;
    max-width: 520px;
    width: 94%;
    background: rgba(5, 0, 20, 0.6);
    border: 1px solid rgba(180, 80, 255, 0.25);
    border-radius: 28px;
    backdrop-filter: blur(18px);
    box-shadow: 0 0 60px rgba(140, 0, 255, 0.12), 0 0 120px rgba(200, 0, 100, 0.06);
    text-align: center;
  }

  /* ===== FRASES ROTATIVAS ===== */
  .phrase-wrap {
    position: relative;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .phrase {
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    color: #e0b8ff;
    line-height: 1.7;
    letter-spacing: 0.02em;
    max-width: 400px;
    position: absolute;
    width: 100%;
    opacity: 0;
    transition: opacity 0.8s ease;
    font-style: italic;
  }
  .phrase.visible { opacity: 1; }
  .phrase span { color: #ff6ec7; font-style: normal; }
  .phrase-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 0.5rem;
  }
  .pdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(180, 80, 255, 0.3);
    transition: all 0.4s;
    cursor: pointer;
  }
  .pdot.active { background: #ff6ec7; transform: scale(1.3); }

  /* ===== TÍTULO DO TIMER ===== */
  .timer-title {
    font-size: clamp(0.75rem, 2.5vw, 0.88rem);
    color: rgba(200, 160, 255, 0.7);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* ===== GRID DO TIMER ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }
  .unit {
    background: rgba(100, 0, 180, 0.15);
    border: 1px solid rgba(180, 80, 255, 0.25);
    border-radius: 14px;
    padding: 1rem 0.5rem 0.8rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
  }
  .unit:hover { border-color: rgba(255, 77, 166, 0.5); }
  .unit-val {
    font-size: clamp(1.7rem, 5vw, 2.2rem);
    font-weight: bold;
    color: #ff6ec7;
    line-height: 1;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 12px rgba(255,110,199,0.5);
    display: block;
    text-align: center;
  }
  .unit-label {
    font-size: 0.62rem;
    color: #c084fc;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
    text-align: center;
  }

  /* ===== DATA DESDE ===== */
  .since {
    font-size: 0.72rem;
    color: rgba(180, 130, 255, 0.5);
    letter-spacing: 0.06em;
  }

  /* ===== CORAÇÃO PULSANTE ===== */
  .heart { display: inline-block; animation: hp 1.6s ease-in-out infinite; }
  @keyframes hp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

  /* ===== SHOOTING STARS (via JS) ===== */
  .shoot {
    position: fixed;
    width: 2px;
    height: 80px;
    background: linear-gradient(to bottom, rgba(255,255,255,0), #fff);
    pointer-events: none;
    z-index: 2;
    animation: shoot linear forwards;
  }
  @keyframes shoot {
    from { opacity: 1; }
    to   { opacity: 0; transform: translateY(200px) translateX(200px); }
  }

  @media (max-width: 420px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .card { padding: 2rem 1.2rem; gap: 1.3rem; }
  }

  /* ===== FRASES ROTATIVAS ===== */
  .phrase-wrap {
    position: relative;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .phrase {
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    color: #e0b8ff;
    line-height: 1.7;
    letter-spacing: 0.02em;
    max-width: 420px;
    position: absolute;
    width: 100%;
    opacity: 0;
    transition: opacity 1s ease;
    font-style: italic;
    text-align: center;
  }
  .phrase.visible { opacity: 1; }
  .phrase span { color: #ff6ec7; font-style: normal; font-weight: bold; }
  .phrase-dots {
    display: flex;
    gap: 7px;
    justify-content: center;
    margin-top: 0.5rem;
  }
  .pdot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(180, 80, 255, 0.25);
    transition: all 0.4s;
  }
  .pdot.active { background: #ff6ec7; transform: scale(1.4); }
</style>
</head>
<body>

<canvas id="galaxy"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="card">

  <!-- FRASES ROTATIVAS -->
  <div class="phrase-wrap" id="phraseWrap"></div>
  <div class="phrase-dots" id="phraseDots"></div>

  <!-- TIMER -->
  <div class="timer-title">Quanto tempo faz que conheci o amor da minha vida</div>

  <div class="grid" id="grid"></div>

  <div class="since" id="since"></div>

</div>

<script>
/* ===== GALÁXIA — CANVAS ===== */
const canvas = document.getElementById('galaxy');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initStars(); });

function initStars(){
  stars = [];
  const count = Math.floor((W * H) / 2000);
  for(let i = 0; i < count; i++){
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.6 + 0.2,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.006,
      color: ['#fff', '#ffd6f5', '#d0b0ff', '#b0d4ff'][Math.floor(Math.random()*4)]
    });
  }
}
initStars();

function drawGalaxy(){
  ctx.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.a += s.da;
    if(s.a < 0 || s.a > 1) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color.replace(')', `,${s.a})`).replace('rgb','rgba').replace('#','rgba(').replace(',','').replace(/(..)(..)(..)/, (m,r,g,b) => parseInt(r,16)+','+parseInt(g,16)+','+parseInt(b,16)+',');
    // simplificado: usar globalAlpha
    ctx.globalAlpha = s.a;
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  requestAnimationFrame(drawGalaxy);
}
drawGalaxy();

/* ===== ESTRELAS CADENTES ===== */
function shootingStar(){
  const el = document.createElement('div');
  el.className = 'shoot';
  const startX = Math.random() * window.innerWidth;
  const startY = Math.random() * window.innerHeight * 0.4;
  el.style.left = startX + 'px';
  el.style.top  = startY + 'px';
  el.style.transform = 'rotate(-45deg)';
  const dur = 0.6 + Math.random() * 0.8;
  el.style.animationDuration = dur + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000);
}
setInterval(shootingStar, 2200);

/* ===== TIMER ===== */
const start = new Date(2026, 2, 22, 5, 34, 0);

const units = [
  { key: 'anos',     id: 'u-anos'  },
  { key: 'meses',    id: 'u-meses' },
  { key: 'dias',     id: 'u-dias'  },
  { key: 'horas',    id: 'u-horas' },
  { key: 'minutos',  id: 'u-min'   },
  { key: 'segundos', id: 'u-sec'   },
];

const grid = document.getElementById('grid');
units.forEach(u => {
  const d = document.createElement('div');
  d.className = 'unit';
  d.innerHTML = `<span class="unit-val" id="${u.id}">00</span><span class="unit-label">${u.key}</span>`;
  grid.appendChild(d);
});

function pad(n){ return String(Math.floor(n)).padStart(2, '0'); }

function tick(){
  const now  = new Date();
  const diff = now - start;

  let anos  = now.getFullYear() - start.getFullYear();
  let meses = now.getMonth()    - start.getMonth();
  let dias  = now.getDate()     - start.getDate();

  if(dias < 0){
    meses--;
    const prev = new Date(now.getFullYear(), now.getMonth(), 0);
    dias += prev.getDate();
  }
  if(meses < 0){ anos--; meses += 12; }

  const totalSecs = Math.floor(diff / 1000);
  const secs      = totalSecs % 60;
  const totalMins = Math.floor(totalSecs / 60);
  const mins      = totalMins % 60;
  const totalHrs  = Math.floor(totalMins / 60);
  const hrs       = totalHrs % 24;

  document.getElementById('u-anos').textContent  = pad(anos);
  document.getElementById('u-meses').textContent = pad(meses);
  document.getElementById('u-dias').textContent  = pad(dias);
  document.getElementById('u-horas').textContent = pad(hrs);
  document.getElementById('u-min').textContent   = pad(mins);
  document.getElementById('u-sec').textContent   = pad(secs);

  const opts = { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
  document.getElementById('since').textContent =
    'desde ' + start.toLocaleDateString('pt-BR', opts);
}
tick();
setInterval(tick, 1000);

/* ===== FRASES ROTATIVAS ===== */
const phrases = [
  "Em todo esse universo infinito,<br>o melhor que já aconteceu comigo<br>foi <span>te conhecer, Ana Beatriz.</span> 💖",
  "Você tem esse jeito de <span>iluminar tudo</span> ao seu redor<br>sem nem perceber o quanto<br>faz a diferença na vida de quem te ama.",
  "Tem momentos que eu olho pra você<br>e me pergunto como fui <span>tão sortudo</span><br>de ter você no meu caminho.",
  "Seu sorriso é daqueles que<br><span>o mundo para um segundo</span><br>só pra admirar. Sério.",
  "Não importa como o dia começa —<br>quando você aparece, ele <span>automaticamente fica melhor.</span>",
  "Seu jeito único de ser<br>é a minha parte favorita<br>de <span>todos os dias.</span>",
  "Se pudesse escolher uma pessoa<br>pra dividir todos os momentos,<br>escolheria <span>você. Sempre.</span> 🌙",
  "Você é daquelas pessoas raras<br>que fazem o mundo parecer<br><span>mais gentil</span> só de existir nele.",
];

let phraseIdx = 0;
const wrap = document.getElementById('phraseWrap');
const dotsEl = document.getElementById('phraseDots');

// Criar elementos de frase
const phraseEls = phrases.map((txt, i) => {
  const p = document.createElement('p');
  p.className = 'phrase' + (i === 0 ? ' visible' : '');
  p.innerHTML = txt;
  wrap.appendChild(p);
  return p;
});

// Criar dots
phrases.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'pdot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
});

function nextPhrase() {
  phraseEls[phraseIdx].classList.remove('visible');
  dotsEl.children[phraseIdx].classList.remove('active');
  phraseIdx = (phraseIdx + 1) % phrases.length;
  phraseEls[phraseIdx].classList.add('visible');
  dotsEl.children[phraseIdx].classList.add('active');
}

setInterval(nextPhrase, 4000);

</script>
</body>
</html>
